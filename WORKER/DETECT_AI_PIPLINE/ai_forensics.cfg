[models]
# Modèles v4.0 — 3 modèles orthogonaux optimisés pour les générateurs 2025-2026
# (FLUX, Midjourney v7, GPT Image 1, SDXL, Ideogram 3)
#
# Modèle 2 : microsoft/swinv2-openfake
#   → Poids fine-tunés OpenFake (ComplexDataLab/Mila/McGill)
#   → Si non disponibles sur HF, le pipeline bascule sur le backbone de base
#   → Pour de meilleures performances, fine-tuner avec : python fine_tune_swinv2.py
#   → Après fine-tuning, remplacer par le chemin local :
#        microsoft/swinv2-openfake = ./swinv2_openfake
#
# Slot 4 optionnel : décommenter pour ajouter un 4e modèle
# (recommandé uniquement si RAM > 24 Go)
#
default_models =
    Organika/sdxl-detector,
    microsoft/swinv2-openfake,
    synthbuster/synthbuster

# Pour utiliser un SwinV2 fine-tuné localement après avoir lancé fine_tune_swinv2.py :
# default_models =
#     Organika/sdxl-detector,
#     ./swinv2_openfake,
#     synthbuster/synthbuster

# Poids de chaque modèle dans la fusion pondérée.
# Recalculés automatiquement par --calibrate (critère FP-first).
# Valeurs initiales avant calibration — répartition prudente, SwinV2 favorisé
# car entraîné sur les générateurs 2025 les plus répandus sur les RS.
[weights]
Organika/sdxl-detector          = 0.40
microsoft/swinv2-openfake        = 0.45
synthbuster/synthbuster          = 0.15

# Biais mesuré sur données réelles — score moyen sur contenu 100% réel.
# Formule de correction : (score_brut - biais) / (1 - biais)
# Recalculés automatiquement par --calibrate.
#
# Valeurs initiales :
#   sdxl-detector  → 0.21 (mesurée sur votre dataset lors de la calibration v3.5.x)
#   swinv2-openfake → 0.50 (neutre — à calibrer impérativement avant production)
#   synthbuster     → valeur mesurée sur votre dataset réentraîné
[bias]
Organika/sdxl-detector          = 0.21
microsoft/swinv2-openfake        = 0.50
synthbuster/synthbuster          = 0.50

[thresholds]
# Seuil au-dessus duquel l'image est classée "synthetic"
threshold_high = 0.82
# Seuil au-dessus duquel l'image est classée "suspicious"
threshold_low  = 0.65

[video]
# fps fixe (utilisé si adaptive_frames = false ou --no-adaptive ou --fps explicite)
fps            = 1
# Plafond absolu de frames par vidéo (laisser vide = pas de limite)
max_frames     =

# Extraction adaptative — nombre de frames selon la durée de la vidéo
adaptive_frames = true
# Paliers : durée_max_secondes:nb_frames — calibrés pour les médias RS
#   < 5s   → 3 frames  (story, GIF)
#   5-15s  → 5 frames  (Reels, TikTok courts)
#   15-60s → 8 frames  (vidéos moyennes)
#   1-3mn  → 12 frames (vidéos longues)
#   > 3mn  → 16 frames (YouTube, interviews)
adaptive_tiers = 5:3, 15:5, 60:8, 180:12, inf:16

[output]
# Nom du fichier CSV de sortie (préfixe horodaté ajouté automatiquement)
output_csv  = results.csv
# Fichier JSON de sortie (laisser vide = désactivé)
json_output =
# Dossier des logs (relatif au script, ou chemin absolu)
# Un fichier par jour : ai_forensics_YYYYMMDD.log (7 jours de rétention)
log_dir     = ../../logs

[behaviour]
# Mode : fast (sdxl uniquement) | balanced (tous les modèles) | accurate (idem balanced)
mode             = balanced
# Fusion pondérée multi-modèles
ensemble         = true
# Exiger un visage détecté avant d'analyser (pour les deepfakes de visages)
require_face     = true
# Correction de biais activée par défaut
bias_correction  = true
# Ignorer les erreurs sur les fichiers individuels
skip_errors      = false
# Niveau de verbosité console : WARNING | INFO | DEBUG
# DEBUG : Tout : connexions, chaque document traité, valeurs intermédiaires, timings internes
# INFO : Démarrages, connexions OK, compteurs, heartbeat — le suivi normal d'activité
# WARNING : Anomalies non bloquantes (champ manquant, reconnexion, modèle absent)
log_level        = INFO
# Écart-type inter-modèles déclenchant une alerte de divergence
divergence_alert_threshold = 0.20
# Chemin vers le repo Synthbuster (vide = ./synthbuster/ à côté du script)
synthbuster_dir  =
# Nombre de workers parallèles (généralement entre 2 et 10)
workers          = 8

[mongodb]
# Credentials MongoDB — utilisés uniquement en mode --mongojob
# ⚠  NE PAS renseigner ici — utiliser le fichier .env à la racine du projet
#    ou les variables d'environnement MONGO_* du système.
#    Les arguments CLI --mongo-* ont priorité sur tout.
#
#    Fichier .env attendu à ~/AI-FORENSICS/.env (voir .env.example)
#    Variables lues : MONGO_HOST, MONGO_PORT, MONGO_USER, MONGO_PASSWORD,
#                     MONGO_DB, MONGO_AUTH_DB
host     =
port     =
user     =
password =
db       =
auth_db  =

[mongojob]
# Intervalle de polling en secondes entre deux lectures de la file jobs
poll_interval    = 10
# Intervalle heartbeat en secondes (affiché si aucun job disponible)
heartbeat_interval = 60
