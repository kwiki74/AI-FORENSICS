[mongodb]
# ⚠  NE PAS renseigner ici — utiliser le fichier .env à la racine du projet
#    ou les variables d'environnement MONGO_* du système.
#    Variables lues : MONGO_HOST, MONGO_PORT, MONGO_USER, MONGO_PASSWORD,
#                     MONGO_DB, MONGO_AUTH_DB
#    Fichier .env attendu à ~/AI-FORENSICS/.env (voir .env.example)
host     =
port     =
user     =
password =
db       =
auth_db  =

[neo4j]
# ⚠  NE PAS renseigner ici — utiliser le fichier .env à la racine du projet
#    Variables lues : NEO4J_URI, NEO4J_USER, NEO4J_PASSWORD
uri      =
user     =
password =

[worker]
# Collections surveillées via Change Streams
watch_collections = posts, comments, accounts

# Taille des batches pour les upserts Neo4j
batch_size = 100

# Nombre max de tentatives en cas de déconnexion MongoDB
max_retries = 10

# Pause en secondes entre deux tentatives de reconnexion
retry_delay = 5

# Intervalle du heartbeat en secondes
heartbeat_interval = 60

# Délai d'inactivité (en secondes) avant de déclencher une passe de détection
# Quand la file Change Stream est vide depuis ce délai → campaign_detector se lance
# Augmenter si le volume de données est faible et les faux déclenchements gênants
# Diminuer si tu veux une détection plus réactive
detection_idle_seconds = 30

# progression tous les N docs (0 = désactivé)
backfill_log_interval = 50

# sync_xxxx : crée les nœuds xxxx dans Neo4j si true
[etl]
sync_accounts   = true
sync_posts      = true
sync_duplicates = true
sync_narratives = true
sync_forwards   = true
sync_projects   = true
sync_media      = false

# Seuil minimum de forward_count Telegram pour créer la relation A_FORWARDÉ
forward_min_count = 2

[detection]
# Score de confiance minimum pour qu'une campagne soit sauvegardée [0-1]
min_score = 0.40

# Désactiver les signaux GDS (Louvain + PageRank) dans la détection automatique
# true  → plus rapide, mais pas de détection de clusters de comptes
# false → complet, nécessite GDS installé dans Neo4j
skip_gds = false

# Niveau de verbosité console : INFO | DEBUG
# DEBUG : Tout : connexions, chaque document traité, valeurs intermédiaires, timings internes
# INFO : Démarrages, connexions OK, compteurs, heartbeat — le suivi normal d'activité
[logging]
log_dir           = logs
log_filename      = network_worker.log
log_level_console = INFO
log_level_file    = DEBUG
log_to_console    = true
log_to_file       = true
log_max_bytes     = 5242880
log_backup_count  = 5
