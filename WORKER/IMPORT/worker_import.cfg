# worker_import.cfg
# Configuration du worker d'ingestion MongoDB — influence_detection
# Les valeurs ici sont des défauts. Les arguments CLI ont priorité sur ce fichier.
# Ce fichier est cherché dans le même dossier que worker_import.py.

[mongodb]
# ⚠  NE PAS renseigner ici — utiliser le fichier .env à la racine du projet
#    ou les variables d'environnement MONGO_* du système.
#    Variables lues : MONGO_HOST, MONGO_PORT, MONGO_USER, MONGO_PASSWORD,
#                     MONGO_DB, MONGO_AUTH_DB
#    Fichier .env attendu à ~/AI-FORENSICS/.env (voir .env.example)
host     =
port     =
user     =
password =
db       =
auth_db  =

[storage]
# Dossier racine du système inbox/processing/done (mode scrapper continu)
storage_dir = storage

# Mode source directe : pointe sur le DOSSIER_INPUT.
# Le worker scanne récursivement ce dossier SANS déplacer les fichiers.
# Laisser vide pour utiliser le mode inbox/ normal.
source_dir = ~/INPUT

[worker]
# Intervalle de polling en secondes (mode surveillance continue — inbox et source)
poll_interval = 120

# Mode surveillance continue du DOSSIER_INPUT :
#   false (défaut) → import one-shot, le worker traite et quitte
#   true           → le worker tourne en boucle, re-scanne toutes les poll_interval secondes
# Peut aussi être activé par l'argument CLI --watch, qui a priorité.
source_watch = true

# Heartbeat — mode surveillance continue (inbox ou source --watch) :
#   Ligne émise sur stderr toutes les N secondes pour confirmer que le worker tourne.
#   Format terminal : "14:32:05 ♥ worker actif — en attente depuis 2m 05s"
#   Format non-TTY  : "14:32:05 [HEARTBEAT] worker actif — en attente depuis 2m 05s"
#   Peut aussi être configuré par l'argument CLI --heartbeat N.
heartbeat_interval = 30

# Taille des batches
batch_size = 50

# Niveau de log : DEBUG | INFO | WARNING | ERROR
# DEBUG : Tout : connexions, chaque document traité, valeurs intermédiaires, timings internes
# INFO : Démarrages, connexions OK, compteurs, heartbeat — le suivi normal d'activité
# WARNING : Anomalies non bloquantes (champ manquant, reconnexion, modèle absent)
# ERROR : Échecs bloquants uniquement — un job raté, une connexion perdue
log_level = INFO

# Dossier où écrire les fichiers de log (créé automatiquement si absent).
# Laisser vide pour afficher uniquement dans le terminal (pas de fichiers de log).
# Trois fichiers sont créés dans ce dossier, avec rotation quotidienne (30 jours) :
#   worker_import.log  — journal principal : chaque fichier traité + résultat OK/NOK
#   errors.log         — uniquement les erreurs et warnings bloquants
#   warnings.log       — anomalies non bloquantes (champs manquants, bugs format, etc.)
log_dir = ~/AI-FORENSICS/logs
