[mongodb]
# ⚠  NE PAS renseigner ici — utiliser le fichier .env à la racine du projet
#    ou les variables d'environnement MONGO_* du système.
#    Variables lues : MONGO_HOST, MONGO_PORT, MONGO_USER, MONGO_PASSWORD,
#                     MONGO_DB, MONGO_AUTH_DB
#    Fichier .env attendu à ~/AI-FORENSICS/.env (voir .env.example)
host     =
port     =
user     =
password =
db       =
auth_db  =

[models]
# Modèle de sentiment français
# Entraîné sur des avis consommateurs (1-5 étoiles), normalisé en positive/negative/neutral
# Autres options testées :
#   nlptown/bert-base-multilingual-uncased-sentiment  (multilingue mais moins précis en FR)
model_fr = cmarkea/distilcamembert-base-sentiment

# Modèle de sentiment anglais
# Entraîné sur des tweets — idéal pour le contenu réseaux sociaux
model_en = cardiffnlp/twitter-roberta-base-sentiment-latest

# Modèle d'embedding multilingue
# 384 dimensions, float16, ~120 Mo — bon équilibre qualité/poids pour textes courts RS
# ⚠ LIMITATION : clustering HDBSCAN charge tous les vecteurs en RAM
#   Limite pratique : ~300 000 documents (16 Go RAM) — voir CR technique
#   Au-delà → migration vers Qdrant (base vectorielle dédiée)
embedding_model = paraphrase-multilingual-MiniLM-L12-v2

# Device d'inférence : auto | cpu | cuda
# auto → GPU si disponible, sinon CPU
device = auto

[sentiment]
# Seuil minimal de score pour considérer une prédiction fiable
# En dessous de ce seuil, le label est conservé mais flaggé comme incertain
# (non implémenté en v1 — prévu pour la v2)
min_confidence = 0.25

# Langue de fallback si la détection échoue ou langue non supportée
# Les textes dans une langue autre que FR/EN sont traités avec ce modèle
fallback_lang = en

[embeddings]
# Nombre maximum de candidats chargés en RAM pour la déduplication
# Limite la consommation mémoire lors de la comparaison par document
# Augmenter si le volume de posts est > 50 000
dedup_candidates_limit = 5000

# Seuil de similarité cosinus au-dessus duquel deux documents sont considérés doublons
# 0.95 = très strict (quasi copié-collé ou paraphrase très proche)
# 0.85 = moins strict (même idée exprimée différemment)
dedup_threshold = 0.95

# Nombre maximum de candidats chargés en RAM pour la déduplication unitaire
# Augmenter si le corpus est très dense (beaucoup de doublons attendus)
# ⚠ LIMITATION documentée dans le CR : le clustering batch charge TOUT en RAM
dedup_max_candidates = 5000

[worker]
# Nombre max de tentatives en cas de déconnexion MongoDB avant arrêt
max_retries = 10
clustering_idle_seconds     = 60
clustering_min_cluster_size = 5
clustering_umap_components  = 50

# Pause en secondes entre deux tentatives de reconnexion
retry_delay = 5

# Valeur placeholder pour embedding_model avant que le worker embeddings tourne
# Ce champ sera mis à jour par le worker embeddings (étape suivante)
embedding_model_placeholder = pending

# Collections à surveiller via Change Streams (séparées par des virgules)
watch_collections = posts, comments

# Intervalle du heartbeat en secondes
# Le worker log "♥ heartbeat" et met à jour MongoDB toutes les N secondes
# Recommandé : 60s en production, 15s en développement pour voir rapidement
# Un outil de supervision peut alerter si last_seen_at > heartbeat_interval * 3
heartbeat_interval = 60

[logging]
# Dossier des logs (relatif au script, ou chemin absolu)
log_dir = ../../logs

# Niveau de log console : DEBUG | INFO | WARNING | ERROR
# DEBUG : Tout : connexions, chaque document traité, valeurs intermédiaires, timings internes
# INFO : Démarrages, connexions OK, compteurs, heartbeat — le suivi normal d'activité
# WARNING : Anomalies non bloquantes (champ manquant, reconnexion, modèle absent)
# ERROR : Échecs bloquants uniquement — un job raté, une connexion perdue

# WARNING recommandé en production, INFO pour le débogage
log_level_console = INFO

# Niveau de log fichier (généralement plus verbeux que la console)
log_level_file = DEBUG

# Activation du log fichier
log_to_file = true

# Activation du log console
log_to_console = true

# Taille maximale d'un fichier de log avant rotation (en octets)
# 5 242 880 = 5 Mo
log_max_bytes = 5242880

# Nombre de fichiers de sauvegarde conservés après rotation
# Avec 5 Mo par fichier et 5 backups → max 30 Mo de logs
log_backup_count = 5

# Nom du fichier de log (dans log_dir)
log_filename = nlp_worker.log
