<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>Pipeline Architecture — Détection d'influence</title>
<style>
  body {

  .c-teal .ts { fill: #0F6E56; }

  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }
  /* c-blue */
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }

  .c-green .th { fill: #27500A; }
  .c-green .ts { fill: #3B6D11; }

  .c-gray .th { fill: #2C2C2A; }
  .c-gray .ts { fill: #5F5E5A; }

  .node:hover rect { opacity: 0.85; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  .leader { stroke: #b4b2a9; stroke-width: 0.5; stroke-dasharray: 3 3; fill: none; }

    body { background: #1a1a18; color: #d3d1c7; }
    h1 { color: #d3d1c7; }
    p.sub { color: #5f5e5a; }
    .t  { fill: #d3d1c7; }

    .c-purple .ts  { fill: #AFA9EC; }

    .c-amber rect { fill: #412402; stroke: #EF9F27; }
