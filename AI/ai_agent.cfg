[enrichment]
bot_score_threshold = 0.7
duplicate_threshold = 3
community_min_size = 5
peak_correlation_days = 30
deepfake_alert_threshold = 0.65
max_extra_calls = 4

[scraping_suggestions]
min_copies_for_priority_high = 5
min_shared_hashtags = 10
cross_platform_auto_suggest = true
min_campaign_score_for_scraping = 0.4
max_account_suggestions = 8
max_hashtag_suggestions = 5

[graphs]
enabled = true
static_format = png
dpi = 120
network_graph_html = true
network_max_nodes = 50
temporal_graph = true
deepfake_histogram = true

[batch]
synthesis_report = true
max_campaigns_in_table = 50
top_amplifiers = 10
synthesis_model =


# ---------------------------------------------------------------------------
# Dossier de sortie des rapports
# Priorité : --output (CLI) > AI_REPORTS_DIR (.env) > ce fichier > défaut (../../reports/)
# Accepte les chemins absolus ou relatifs au répertoire home (~).
# Laisser vide = dossier par défaut : ~/AI-FORENSICS/reports/
# ---------------------------------------------------------------------------
[output]
# reports_dir = ~/AI-FORENSICS/reports
# reports_dir = /home/kwiki/AI-FORENSICS/AI/reports
reports_dir = /home/kwiki/AI-FORENSICS/AI/reports
